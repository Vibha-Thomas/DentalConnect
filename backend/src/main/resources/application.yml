spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dentconnect}
    username: ${DB_USERNAME:dentconnect}
    password: ${DB_PASSWORD:dentconnect_dev_2024}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:ZGVudGNvbm5lY3QtandlLXNlY3JldC1rZXktZm9yLWRldmVsb3BtZW50LW1pbmltdW0tMjU2LWJpdHMtbG9uZy1zdHJpbmcK}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}          # 15 minutes
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 days
  firebase:
    config-path: ${FIREBASE_CONFIG_PATH:firebase-service-account.json}
    storage-bucket: ${FIREBASE_STORAGE_BUCKET:}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8081}
  profile:
    minimum-completion-for-application: ${PROFILE_MIN_COMPLETION:80}
    signed-url-expiry-minutes: ${SIGNED_URL_EXPIRY_MINUTES:60}
  admin:
    dashboard-cache-seconds: ${DASHBOARD_CACHE_SECONDS:30}
    search-max-results: ${SEARCH_MAX_RESULTS:50}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.dentconnect: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
